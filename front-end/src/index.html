<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>PRAGATHI ENTERPRISES</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="logo-text-gold-stacked.svg">
  <style>
    /* Loading Screen Styles */
    app-root {
      display: block;
    }

    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #f8fafc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      animation: fadeIn 0.5s ease-out;
      z-index: 9999;
    }

    .loading-logo {
      width: 280px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #DAA520;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 15px;
      color: #DAA520;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <app-root>
    <div class="app-loading">
      <img src="logo-text-gold-stacked.svg" alt="Pragathi Enterprises" class="loading-logo">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Application...</div>
    </div>
  </app-root>
</body>

</html>
